name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  manifest:
    name: manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ci.sh manifest

  repo-smoke:
    name: repo-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ci.sh repo-smoke

  road-master-tests:
    name: road-master-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ci.sh road-master-tests

  content-inspector:
    name: content-inspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ci.sh content-inspector

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: scripts/ci.sh shellcheck

  bash:
    name: bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/ci.sh bash
