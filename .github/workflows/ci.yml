name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  manifest:
    name: manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/validate_manifest.sh

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: cd scripts && shellcheck -x ./*.sh

  bash:
    name: bash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: for f in scripts/*.sh; do bash -n "$f"; done

  repo-smoke:
    name: repo-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/check_repo_structure.sh
